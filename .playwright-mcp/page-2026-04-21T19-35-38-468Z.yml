              - heading "Common Microsoft 365 Security Gaps We Find in Small Business Tenants" [level=2] [ref=e832]
            - paragraph [ref=e833]: These are the issues we encounter most frequently when auditing a new client's tenant. None require expensive tools to fix — they require configuration and attention.
            - generic [ref=e834]:
              - generic [ref=e835]:
                - generic [ref=e837]: 
                - generic [ref=e838]: Shared admin credentials
                - generic [ref=e839]: Multiple staff using one global admin account. No accountability, no individual audit trail, no clean MFA.
              - generic [ref=e840]:
                - generic [ref=e842]: 
                - generic [ref=e843]: MFA gaps on service accounts
                - generic [ref=e844]: MFA enforced for regular users but service accounts and shared mailboxes were excluded. Attackers scan specifically for these exclusions.
              - generic [ref=e845]:
                - generic [ref=e847]: 
                - generic [ref=e848]: Legacy auth still active
                - generic [ref=e849]: An old printer or accounting integration was never modernized. Legacy auth bypasses MFA entirely for those connections.
              - generic [ref=e850]:
                - generic [ref=e852]: 
                - generic [ref=e853]: SharePoint sharing open to anyone
                - generic [ref=e854]: Default sharing settings mean files can be shared with no sign-in required. Confidential docs end up with publicly accessible URLs.
              - generic [ref=e855]:
                - generic [ref=e857]: 
                - generic [ref=e858]: No mailbox audit review
                - generic [ref=e859]: Auditing was never verified on older accounts. After a compromise, there are no logs to reconstruct what happened.
              - generic [ref=e860]:
                - generic [ref=e862]: 
                - generic [ref=e863]: DKIM and DMARC missing
                - generic [ref=e864]: SPF exists but DKIM and DMARC were never configured. The domain is used in invoice fraud attacks against the company's own clients.
              - generic [ref=e865]:
                - generic [ref=e867]: 
                - generic [ref=e868]: No third-party backup
                - generic [ref=e869]: The business assumes Microsoft backs up their data. Version history is the assumed recovery tool — until ransomware makes that irrelevant.
              - generic [ref=e870]:
                - generic [ref=e872]: 
                - generic [ref=e873]: Guest accounts never reviewed
                - generic [ref=e874]: Contractors from 12–18 months ago still have active guest access to Teams channels with current client data.
