              - heading "Multi-Factor Authentication (MFA)" [level=2] [ref=e307]
            - generic [ref=e308]:
              - generic [ref=e309]: 99.9%
              - generic [ref=e310]: of automated account takeover attacks are blocked by MFA, according to Microsoft telemetry
            - paragraph [ref=e311]: Enforcing MFA across every Microsoft 365 account is the single highest-impact control available to a small business. Passwords alone are routinely stolen through phishing, credential stuffing, and info-stealer malware. MFA blocks the overwhelming majority of automated account takeover attempts — and its absence is the most common reason cyber insurance claims are denied after a breach.
            - generic [ref=e312]:
              - generic [ref=e313]:
                - generic [ref=e314]: 
                - heading "Enforce MFA on all user accounts" [level=3] [ref=e315]
              - generic [ref=e316]:
                - generic [ref=e317]:
                  - generic [ref=e318]: Why it matters
                  - text: A stolen password alone accesses email, SharePoint, Teams, and all connected apps without MFA.
                - generic [ref=e319]:
                  - generic [ref=e320]: Risk if skipped
                  - text: Account takeover, business email compromise, full mailbox access. Insurers frequently deny claims when MFA was not enforced.
                - generic [ref=e321]:
                  - generic [ref=e322]: Where to configure
                  - text: Entra admin centre → Identity → Authentication methods. Or enable Security Defaults (Entra → Properties → Manage Security Defaults).
                - generic [ref=e323]:
                  - generic [ref=e324]: License
                  - text: All plans. Conditional Access-enforced MFA requires Business Premium or Entra ID P1.
            - generic [ref=e325]:
              - generic [ref=e326]:
                - generic [ref=e327]: 
                - heading "Prefer authenticator apps over SMS codes" [level=3] [ref=e328]
              - generic [ref=e329]:
                - generic [ref=e330]:
                  - generic [ref=e331]: Why it matters
                  - text: SMS-based MFA is vulnerable to SIM swapping. Authenticator app codes are generated locally and cannot be intercepted remotely.
                - generic [ref=e332]:
                  - generic [ref=e333]: Risk if skipped
                  - text: A SIM swap allows an attacker to receive the SMS code and bypass MFA entirely — a documented pattern in Canadian business email compromise cases.
                - generic [ref=e334]:
                  - generic [ref=e335]: Where to configure
                  - text: Entra admin centre → Authentication methods → Policies. Enable Microsoft Authenticator, disable SMS sign-in where possible.
                - generic [ref=e336]:
                  - generic [ref=e337]: License
                  - text: All plans. Microsoft Authenticator is free.
