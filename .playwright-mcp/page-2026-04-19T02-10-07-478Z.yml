          - generic [ref=e90]:
            - heading "How to Protect Your Small Business from Phishing Attacks" [level=2] [ref=e91]
            - paragraph [ref=e92]: Phishing is the single most common way attackers get into a small business — and it is the leading cause of cyber insurance claims. The most common patterns we see are invoice fraud, Microsoft 365 login spoofs that steal session cookies, CEO impersonation, and QR-code phishing that moves the attack to a personal phone (outside your defenses).
            - paragraph [ref=e93]: Defense comes in two layers. At the tenant level, configure SPF, DKIM, and DMARC on your sending domains and enable Microsoft Defender for Office 365 anti-phishing, Safe Links, and Safe Attachments. At the human level, give staff a simple one-click reporting button, run short monthly phishing simulations, and make it socially safe to report a suspicious message — even after clicking it.
            - list [ref=e94]:
              - listitem [ref=e95]: Configure SPF, DKIM, and DMARC on every domain you send mail from
              - listitem [ref=e96]: Enable Defender for Office 365 Safe Links and Safe Attachments tenant-wide
              - listitem [ref=e97]: Install the Microsoft "Report Message" add-in for all users
              - listitem [ref=e98]: Run a monthly phishing simulation — frequency beats length
              - listitem [ref=e99]: Document what to do if an employee clicks a phishing link
            - paragraph [ref=e100]: "Related reading (coming soon): How to Configure DMARC for Your Business Domain · Defender for Office 365 Setup Guide · How to Train Employees to Spot Phishing Emails · What to Do If an Employee Clicks a Phishing Link."
          - generic [ref=e101]:
            - heading "How to Set Up Multi-Factor Authentication (MFA) in Microsoft 365" [level=2] [ref=e102]
            - paragraph [ref=e103]: Passwords alone no longer meet Canadian cyber insurance requirements. MFA — sometimes called 2FA — adds a second check beyond the password, typically a code or push notification from an authenticator app. When enforced tenant-wide, MFA blocks the overwhelming majority of automated account takeover attempts.
            - paragraph [ref=e104]: "The safest method is an authenticator app (Microsoft Authenticator or a passkey), followed by app-based codes. SMS and email codes are better than nothing but are vulnerable to SIM swapping and mailbox compromise. The pitfalls we see most often: shared mailboxes and service accounts that slip through enforcement, and break-glass admin accounts that never get tested."
            - list [ref=e105]:
              - listitem [ref=e106]: Enforce MFA on every user, not just administrators
              - listitem [ref=e107]: Prefer Microsoft Authenticator or passkeys over SMS
              - listitem [ref=e108]: Register at least two break-glass admin accounts with physical security keys
              - listitem [ref=e109]: Audit service accounts and mail-enabled identities quarterly
              - listitem [ref=e110]: Record MFA enforcement evidence for your cyber insurance renewal
            - paragraph [ref=e111]: "Related reading (coming soon): How to Enable MFA for All Microsoft 365 Users · Microsoft Authenticator vs. SMS Codes · MFA Requirements for Cyber Insurance in Canada."
          - generic [ref=e112]:
            - heading "Identity Protection & Account Takeover Prevention for Microsoft 365" [level=2] [ref=e113]
            - paragraph [ref=e114]: Identity is the new perimeter for Microsoft 365 businesses. Once an attacker owns a valid identity, MFA alone will not always stop them — especially with modern adversary-in-the-middle phishing kits that steal session tokens. Protecting identities means watching how, where, and from what device sign-ins happen.
            - heading "Legacy authentication risks" [level=3] [ref=e115]
            - paragraph [ref=e116]: Legacy protocols such as IMAP, POP, and basic SMTP auth cannot enforce MFA. Attackers specifically scan for these endpoints because a stolen password alone grants mailbox access. Disabling legacy authentication is one of the highest-impact, lowest-effort wins you can deploy — and insurers are now flagging tenants that leave it on.
            - heading "Impossible travel and risky sign-ins" [level=3] [ref=e117]
            - paragraph [ref=e118]: Microsoft Entra ID Protection flags sign-ins from geographically impossible locations (Toronto at 9:00 a.m., Lagos at 9:15 a.m.), anonymous IP ranges, and known leaked credentials. The risk signal is only useful if somebody triages it — either your internal IT or a managed provider on a documented runbook.
            - heading "Session hijacking and token theft" [level=3] [ref=e119]
            - paragraph [ref=e120]: Modern AiTM (adversary-in-the-middle) phishing kits steal authenticated session tokens, bypassing MFA entirely. Defenses include token binding with compliant devices, short session lifetimes for risky sign-ins, and continuous access evaluation. These sit inside conditional access.
            - heading "Conditional access basics for SMBs" [level=3] [ref=e121]
            - paragraph [ref=e122]: "A realistic 5–50 employee Microsoft 365 tenant can get significant protection from a small set of policies: block legacy authentication, require MFA for all users, require compliant or hybrid-joined devices for admin actions, and restrict sign-ins from countries you do not operate in. Start small, monitor impact, and expand."
            - paragraph [ref=e123]: "Related reading (coming soon): How to Disable Legacy Authentication in Microsoft 365 · Conditional Access Policies Every Small Business Needs · How to Investigate a Risky Sign-In Alert · Protecting Against Token Theft and AiTM Phishing."
          - generic [ref=e124]:
            - heading "How to Protect Your Small Business from Ransomware" [level=2] [ref=e125]
            - paragraph [ref=e126]: "Ransomware almost always enters an SMB through the same path: a phishing email steals a credential, the attacker moves laterally using that identity, and then deploys encryption across reachable systems. Every stage of that chain can be blocked — which is why layered controls matter more than any single tool."
            - paragraph [ref=e127]: "Follow the 3-2-1 backup rule: three copies of your data, on two different media, with one copy offline or in a separate cloud tenant. Combine that with least-privilege access, endpoint detection, and email filtering. In plain language, recovery planning comes down to two numbers: how much data you can afford to lose (RPO) and how long you can afford to be down (RTO). Most SMBs discover those numbers are much smaller than they assumed."
            - list [ref=e128]:
              - listitem [ref=e129]: Enforce least-privilege on both users and admin accounts
              - listitem [ref=e130]: Keep at least one backup copy outside the production cloud tenant
              - listitem [ref=e131]: Test restores quarterly — an untested backup is not a backup
              - listitem [ref=e132]: Document who decides what in the first 60 minutes of an incident
              - listitem [ref=e133]: Confirm your cyber policy position on ransom payment before you need it
            - paragraph [ref=e134]: "Related reading (coming soon): The 3-2-1 Backup Rule Explained · Ransomware Response Plan Template · How to Recover Microsoft 365 Data After a Ransomware Attack."
          - generic [ref=e135]:
            - heading "Endpoint Security for Small Business Employee Devices" [level=2] [ref=e136]
            - paragraph [ref=e137]: Endpoints means laptops, desktops, phones, and tablets — including personal devices used for work. Built-in Windows Defender is a strong starting point but is often not sufficient for a business facing targeted threats and insurance scrutiny. Microsoft Defender for Business and Intune cover most SMB needs, and managed EDR platforms like Huntress add analyst-led response for environments without a dedicated security team.
            - paragraph [ref=e138]: Remote and hybrid work make endpoint hygiene harder. Enforce disk encryption, automatic OS and software patching, screen-lock timeouts, and the ability to remotely wipe a lost device. Treat BYOD with a written policy that defines what can be accessed, from what device state, and how it is retired.
            - list [ref=e139]:
              - listitem [ref=e140]: Deploy endpoint detection and response (EDR), not legacy antivirus alone
              - listitem [ref=e141]: Enforce disk encryption and automatic updates through Intune or equivalent
              - listitem [ref=e142]: Standardize a BYOD policy covering access, compliance, and offboarding
              - listitem [ref=e143]: Maintain the ability to remote-wipe lost or stolen devices
              - listitem [ref=e144]: Review EDR coverage before your cyber insurance renewal
            - paragraph [ref=e145]:
              - text: Pair this guide with our
              - link "managed security and firewall service" [ref=e146] [cursor=pointer]:
                - /url: /security-firewall
              - text: for hands-on deployment of Huntress EDR, Tailscale zero-trust access, and tenant hardening.
          - generic [ref=e147]:
            - heading "Microsoft 365 Backup & Disaster Recovery (The Shared Responsibility Model)" [level=2] [ref=e148]
            - paragraph [ref=e149]: Microsoft protects the platform. You are responsible for your data. That line — the shared responsibility model — is where most small businesses discover an expensive gap. OneDrive sync, SharePoint version history, and the Recycle Bin are not a backup. They are convenience features with short retention windows that do not protect you from ransomware, insider deletion, a departed employee, or tenant misconfiguration.
            - paragraph [ref=e150]: "A real backup means an independent, immutable copy of your Exchange, SharePoint, OneDrive, and Teams data — stored outside the production tenant and restorable to a known-good point in time. Pair it with a simple disaster recovery plan that answers: who decides, who communicates, in what order do we restore, and how do we prove it worked afterwards."
            - list [ref=e151]:
              - listitem [ref=e152]: Deploy a third-party Microsoft 365 backup with long retention
              - listitem [ref=e153]: Document a simple DR plan with named owners and communication paths
              - listitem [ref=e154]: Run one full restore test every quarter — not just spot checks
              - listitem [ref=e155]: Keep restore evidence on file for cyber insurance claims
              - listitem [ref=e156]: Treat OneDrive, SharePoint history, and Recycle Bin as recovery convenience only
            - paragraph [ref=e157]: "Related reading (coming soon): Does Microsoft 365 Back Up Your Data? · How to Choose a Microsoft 365 Backup Solution · Disaster Recovery Plan Template for Small Businesses."
