                - heading "Prefer authenticator apps over SMS codes" [level=3] [ref=e365]
              - generic [ref=e366]:
                - generic [ref=e367]:
                  - generic [ref=e368]: Why it matters
                  - text: SMS-based MFA is vulnerable to SIM swapping. Authenticator app codes are generated locally and cannot be intercepted remotely.
                - generic [ref=e369]:
