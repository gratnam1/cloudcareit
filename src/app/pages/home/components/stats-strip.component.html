<!-- ========== STATS STRIP ========== -->
<section class="stats-strip reveal-section" aria-label="Key Metrics">
  <div class="container">
    <div class="stats-grid">
      <div class="stat-item consultation-reveal">
        <span class="stat-value metric-counter" data-target="15">0</span><span class="stat-suffix">+</span>
        <span class="stat-label">Years in GTA IT</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item consultation-reveal">
        <span class="stat-value">&lt;15</span><span class="stat-suffix">min</span>
        <span class="stat-label">Guaranteed Response</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item consultation-reveal">
        <span class="stat-value metric-counter" data-target="100">0</span><span class="stat-suffix">%</span>
        <span class="stat-label">Uptime SLA Target</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item consultation-reveal">
        <span class="stat-value">30</span><span class="stat-suffix">day</span>
        <span class="stat-label">Risk-Free Trial</span>
      </div>
    </div>
  </div>
</section>
