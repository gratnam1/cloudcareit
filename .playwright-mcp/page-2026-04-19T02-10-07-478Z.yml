            - 'heading "Small Business Cybersecurity: The Complete Checklist & Protection Guide for Microsoft 365" [level=1] [ref=e35]'
            - paragraph [ref=e36]: A practical security playbook for Canadian small businesses on Microsoft 365 — built by the managed IT team at CtrlShift IT Services.
            - generic [ref=e37]:
              - generic [ref=e38]:
                - generic [ref=e39]:
                  - generic [ref=e40]: Estimated reading time
                  - generic [ref=e41]: 12 minutes
                - generic [ref=e42]:
                  - generic [ref=e43]: Who this guide is for
                  - generic [ref=e44]: Owners, office managers, and IT decision-makers at Canadian small businesses (5–50 employees) using Microsoft 365 who want to reduce breach risk, meet cyber insurance requirements, and build a defensible security posture.
              - generic [ref=e45]: "Last reviewed: April 2026"
            - 'heading "Why Small Businesses Are the #1 Target for Cyberattacks in Canada" [level=2] [ref=e46]'
            - paragraph [ref=e47]: "Small businesses — not enterprises — are now the most-targeted segment in Canada. Roughly 60% of small businesses hit by a serious cyberattack close within six months. The comfortable myth that \"we are too small to be a target\" no longer holds: attackers use automation to scan the entire internet, and your size does not protect you from a ransomware kit or a credential-stuffing script."
            - paragraph [ref=e48]: Two things have changed the stakes in the last 24 months. First, cyber insurance carriers now require multi-factor authentication, endpoint protection, and documented backups before issuing or paying out on a policy. Second, Microsoft 365 has become the primary attack surface for most SMBs, which means tenant-level protection is no longer optional. This guide walks through the controls that matter most, in the order we deploy them for clients.
            - generic [ref=e49]:
              - generic [ref=e50]: Not sure where your business stands?
              - generic [ref=e51]: Get a no-pressure review of your Microsoft 365 tenant, endpoints, and backup posture.
              - link "Request a Free Security Assessment" [ref=e52] [cursor=pointer]:
                - /url: /free-security-assessment
          - generic [ref=e53]:
