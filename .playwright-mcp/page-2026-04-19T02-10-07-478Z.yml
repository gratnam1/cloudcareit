          - generic [ref=e165]:
            - heading "Frequently Asked Questions" [level=2] [ref=e166]
            - generic [ref=e167]:
              - generic [ref=e168]:
                - heading "How much should a small business spend on cybersecurity?" [level=3] [ref=e169]
                - paragraph [ref=e170]: Most Canadian small businesses we work with spend between 3% and 8% of their IT budget on security controls such as MFA, endpoint protection, email filtering, and third-party backup. The exact number depends on regulated data, cyber insurance requirements, and remote-work footprint.
              - generic [ref=e171]:
                - heading "Is Microsoft 365 secure out of the box?" [level=3] [ref=e172]
                - paragraph [ref=e173]: Microsoft 365 provides a secure platform, but default tenant settings leave important gaps. Multi-factor authentication, conditional access, legacy authentication blocking, and third-party backup still need to be configured to reach a defensible posture.
              - generic [ref=e174]:
                - heading "What does cyber insurance require from a small business?" [level=3] [ref=e175]
                - paragraph [ref=e176]: Canadian cyber insurers increasingly require enforced MFA on all users, endpoint detection and response (EDR), documented backups, a tested incident response plan, and evidence that legacy authentication is disabled. Missing controls can trigger coverage exclusions or denied claims.
              - generic [ref=e177]:
                - heading "Do we really need MFA if we use strong passwords?" [level=3] [ref=e178]
                - paragraph [ref=e179]: Yes. Strong passwords still get stolen through phishing, credential stuffing, and info-stealer malware. MFA stops most automated account takeovers and is now considered a baseline control by insurers and regulators, not a premium add-on.
              - generic [ref=e180]:
                - heading "What is legacy authentication and why is it dangerous?" [level=3] [ref=e181]
                - paragraph [ref=e182]: Legacy authentication refers to older Microsoft 365 sign-in protocols like IMAP, POP, and basic SMTP auth that cannot enforce MFA. Attackers specifically target these protocols because a stolen password alone grants access. Disabling legacy auth is one of the highest-impact controls you can enable.
              - generic [ref=e183]:
                - heading "What is the difference between antivirus and endpoint protection (EDR)?" [level=3] [ref=e184]
                - paragraph [ref=e185]: Traditional antivirus matches known malware signatures. Endpoint detection and response (EDR) watches device behavior, identifies suspicious activity, isolates compromised devices, and supports human-led investigation. Most cyber insurance policies now expect EDR, not basic antivirus.
              - generic [ref=e186]:
                - heading "Does Microsoft back up my emails and files in 365?" [level=3] [ref=e187]
                - paragraph [ref=e188]: Microsoft protects the platform and provides limited retention, but under the shared responsibility model your data is your responsibility. Recycle Bin and version history are not a backup. A dedicated third-party backup is what restores your business after ransomware, insider deletion, or a departed employee.
              - generic [ref=e189]:
                - heading "How often should we run security awareness training for staff?" [level=3] [ref=e190]
                - paragraph [ref=e191]: A short monthly phishing simulation plus quarterly micro-training works better for small teams than a single annual session. Frequency matters more than length because phishing tactics evolve continuously.
              - generic [ref=e192]:
                - heading "What should we do immediately if we suspect a breach?" [level=3] [ref=e193]
                - paragraph [ref=e194]: Preserve evidence, isolate affected accounts and devices, reset credentials for impacted users, notify leadership, and contact your managed IT or incident response provider before changing the environment. Do not delete logs or reimage machines until an investigator reviews them.
              - generic [ref=e195]:
                - heading "Is cyber insurance worth it for a 20-person business in Canada?" [level=3] [ref=e196]
                - paragraph [ref=e197]: For most Canadian SMBs the answer is yes. A single ransomware event can cost 6 to 7 figures in recovery, downtime, and legal notification. Insurance is meaningful only when your underlying controls match what the policy requires, so readiness and coverage go together.
          - generic [ref=e198]:
            - heading "Your Next Steps" [level=2] [ref=e199]
            - paragraph [ref=e200]: "Security is ongoing, not a one-time project. The practical path for most 5–50 employee businesses: run the 11-point checklist above, fix the highest-impact gaps first (MFA, legacy authentication, backup, endpoint protection), then schedule a quarterly review so controls do not drift. Treat cyber insurance readiness as the outcome — it is the best external signal that your posture actually works."
