              - listitem [ref=e817]: Test restores quarterly and document results — an untested backup is not a backup
              - listitem [ref=e818]: Write down who makes decisions in the first 60 minutes of an incident, before you need it
              - listitem [ref=e819]: Confirm your cyber insurance policy's position on ransom payment in advance
