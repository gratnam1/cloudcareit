                  - generic [ref=e563]: Why it matters
                  - text: DKIM cryptographically signs every outbound message. Receiving servers verify the signature, confirming the email originated from your domain and was not altered in transit.
                - generic [ref=e564]:
                  - generic [ref=e565]: Risk if skipped
                  - text: Spoofed emails appearing to come from your domain pass authentication checks. Your domain becomes usable for phishing campaigns against your own clients.
                - generic [ref=e566]:
                  - generic [ref=e567]: Where to configure
                  - text: security.microsoft.com → Email & collaboration → Policies & rules → Threat policies → Email authentication → DKIM tab. Enable for each custom domain, then add the two CNAME records to your DNS registrar.
