            - generic [ref=e345]:
              - generic [ref=e346]: 99.9%
              - generic [ref=e347]: of automated account takeover attacks are blocked by MFA, according to Microsoft telemetry
            - paragraph [ref=e348]: Enforcing MFA across every Microsoft 365 account is the single highest-impact control available to a small business. Passwords alone are routinely stolen through phishing, credential stuffing, and info-stealer malware. MFA blocks the overwhelming majority of automated account takeover attempts — and its absence is the most common reason cyber insurance claims are denied after a breach.
            - generic [ref=e349]:
              - generic [ref=e350]:
                - generic [ref=e351]: 
                - heading "Enforce MFA on all user accounts" [level=3] [ref=e352]
              - generic [ref=e353]:
                - generic [ref=e354]:
                  - generic [ref=e355]: Why it matters
                  - text: A stolen password alone accesses email, SharePoint, Teams, and all connected apps without MFA.
                - generic [ref=e356]:
                  - generic [ref=e357]: Risk if skipped
                  - text: Account takeover, business email compromise, full mailbox access. Insurers frequently deny claims when MFA was not enforced.
                - generic [ref=e358]:
                  - generic [ref=e359]: Where to configure
                  - text: Entra admin centre → Identity → Authentication methods. Or enable Security Defaults (Entra → Properties → Manage Security Defaults).
                - generic [ref=e360]:
                  - generic [ref=e361]: License
                  - text: All plans. Conditional Access-enforced MFA requires Business Premium or Entra ID P1.
            - generic [ref=e362]:
              - generic [ref=e363]:
