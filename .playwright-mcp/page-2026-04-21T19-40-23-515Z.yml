            - paragraph [ref=e850]: "Ransomware attacks almost always follow the same path: a phishing email compromises a credential, the attacker moves laterally, then deploys encryption. Every stage of that chain is breakable — MFA stops credential-only attacks, endpoint protection detects lateral movement, Safe Attachments blocks malicious payloads, and backup provides the recovery path."
            - list [ref=e851]:
              - listitem [ref=e852]: Enforce least-privilege on both user and admin accounts — limit the blast radius of any compromised identity
              - listitem [ref=e853]: "Apply the 3-2-1 rule: three copies of data, two media types, one copy outside the production tenant"
              - listitem [ref=e854]: Test restores quarterly and document results — an untested backup is not a backup
              - listitem [ref=e855]: Write down who makes decisions in the first 60 minutes of an incident, before you need it
              - listitem [ref=e856]: Confirm your cyber insurance policy's position on ransom payment in advance
